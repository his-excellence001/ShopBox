<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopBox - Sales Terminal</title>
    <meta name="theme-color" content="#0f172a">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header>
        <h1><img src="logo.png" alt="ShopBox" style="height: 32px; vertical-align: middle; margin-right: 8px;"> ShopBox</h1>
        <div style="display: flex; gap: 10px; align-items: center;">
            <span id="userLabel" style="font-size: 0.8rem; color: #7f8c8d; font-weight: bold;"></span>
            <span style="font-size: 0.8rem; color: #7f8c8d;">v1.0</span>
            <button onclick="handleLogout()" class="btn btn-outline" style="padding: 4px 12px; font-size: 0.75rem;">Logout</button>
        </div>
    </header>
    <div class="summary-grid">
        <div class="summary-card"><div class="label">Sales (Today)</div><div class="value" id="salesCount">0</div></div>
        <div class="summary-card"><div class="label">Profit (Today)</div><div class="value green" id="profitToday">$0.00</div></div>
        <div class="summary-card"><div class="label">Low Stock</div><div class="value orange" id="lowStockCount">0</div></div>
    </div>
    <div class="toolbar" style="justify-content: center; align-items: center;">
        <span style="color: #2c3e50; font-weight: 600; margin-right: 8px;">Active Seller:</span>
        <select id="activeSeller" style="padding: 8px; border-radius: 8px; border: 1px solid #bdc3c7; font-size: 0.9rem; background: white;"></select>
    </div>
    <div class="toolbar"><input type="text" id="searchInput" placeholder="🔍 Search products..." class="search-input"></div>
    <div class="toolbar">
        <button class="btn btn-outline" onclick="resetDemo()">Reset Demo</button>
        <button class="btn btn-outline" onclick="exportCSV()">📥 Export CSV</button>
    </div>
    <div id="dashboardLinkContainer" class="toolbar" style="margin-top: 15px; justify-content: center; display: none;">
        <a href="dashboard.html" class="btn btn-primary" style="text-decoration: none; text-align: center; width: 100%;">📊 Owner Dashboard</a>
    </div>
    <div id="productList" class="product-list"></div>
    <script src="script.js"></script>
</body>
</html>
