<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopBox - Clerk Sales Terminal</title>
    
    <!-- PWA & Mobile Polish Meta Tags -->
    <meta name="theme-color" content="#0f172a" />
    <link rel="manifest" href="manifest.json" />

    <link rel="stylesheet" href="style.css">
</head>
<body class="app-body">

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-brand">
            <h1>ShopBox <span>POS</span></h1>
        </div>
        <div class="nav-actions">
            <a href="dashboard.html" class="btn-secondary">📊 Owner Dashboard</a>
        </div>
    </nav>

    <main class="app-container">
        <!-- ADD PRODUCT SECTION -->
        <section class="card">
            <h2>➕ Add New Inventory Item</h2>
            <form id="addProductForm" onsubmit="handleProductAdd(event)">
                <div class="form-group">
                    <label for="productName">Product Name</label>
                    <input type="text" id="productName" placeholder="e.g. Milk 1L" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="costPrice">Cost Price ($)</label>
                        <input type="number" id="costPrice" step="0.01" min="0" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label for="sellingPrice">Selling Price ($)</label>
                        <input type="number" id="sellingPrice" step="0.01" min="0" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label for="stockQty">Initial Stock</label>
                        <input type="number" id="stockQty" min="0" placeholder="0" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Add Product</button>
            </form>
        </section>

        <!-- INVENTORY / SALES LIST -->
        <section class="card" style="margin-top: 20px;">
            <h2>📦 Current Inventory & Quick Sale</h2>
            <div id="product-list" class="product-grid">
                <!-- Products dynamically render here via script.js -->
            </div>
        </section>
    </main>

    <!-- FORM INGESTION SCRIPT HANDLER -->
    <script>
        function handleProductAdd(event) {
            event.preventDefault();
            const name = document.getElementById('productName').value;
            const cost = document.getElementById('costPrice').value;
            const price = document.getElementById('sellingPrice').value;
            const qty = document.getElementById('stockQty').value;

            if (typeof addProduct === 'function') {
                addProduct(name, cost, price, qty);
                document.getElementById('addProductForm').reset();
            }
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
