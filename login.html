<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ShopBox</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        body { background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: system-ui, sans-serif; }
        .login-card { background: #1e293b; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center; color: #e2e8f0; border: 1px solid #334155; }
        .login-card h1 { margin-bottom: 24px; color: #e2e8f0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .form-group { margin-bottom: 16px; text-align: left; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #94a3b8; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #334155; border-radius: 8px; font-size: 1rem; background: #0f172a; color: #e2e8f0; }
        .login-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-secondary { background: #334155; color: #e2e8f0; border: none; padding: 10px; border-radius: 8px; flex: 1; cursor: pointer; }
        .btn-secondary:hover { background: #475569; }
        .error-msg { color: #ef4444; font-size: 0.9rem; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1><img src="logo.png" alt="ShopBox" style="height: 32px;"> ShopBox</h1>
        <!-- Login form (hidden during first setup) -->
        <div id="loginForm">
            <div class="form-group">
                <label for="loginUser">Your Name</label>
                <input type="text" id="loginUser" placeholder="e.g. Tanaka">
            </div>
            <div class="form-group">
                <label for="loginPin">Your PIN</label>
                <input type="password" id="loginPin" placeholder="Enter your 4-digit PIN">
            </div>
            <div class="login-buttons">
                <button class="btn btn-secondary" onclick="handleRegister()">Register</button>
                <button class="btn btn-primary" onclick="handleLogin()">Login</button>
            </div>
            <div id="loginError" class="error-msg"></div>
        </div>
        <!-- First‑time setup form (only shown when no users exist) -->
        <div id="setupForm" style="display: none;">
            <h2 style="margin-bottom: 20px;">Welcome! Set up your shop</h2>
            <div class="form-group">
                <label for="setupShopName">Shop Name</label>
                <input type="text" id="setupShopName" placeholder="e.g. Tanaka's Tuckshop">
            </div>
            <div class="form-group">
                <label for="setupOwnerName">Your Name</label>
                <input type="text" id="setupOwnerName" placeholder="e.g. Tanaka">
            </div>
            <div class="form-group">
                <label for="setupPin">4‑Digit Owner PIN</label>
                <input type="password" id="setupPin" placeholder="Create a secure PIN">
            </div>
            <div class="login-buttons">
                <button class="btn btn-primary" onclick="handleSetup()" style="flex:2;">Create Shop & Login</button>
            </div>
            <div id="setupError" class="error-msg"></div>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
