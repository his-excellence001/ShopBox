<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopBox - Login</title>
    <style>
        /* Premium Dark Theme Styles */
        body { 
            background: #0f172a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }
        
        .login-card { 
            background: #1e293b; 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            color: #e2e8f0; 
            border: 1px solid #334155; 
        }
        
        .login-card h1 { 
            margin-top: 0;
            margin-bottom: 24px; 
            color: #e2e8f0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            font-size: 1.8rem;
        }

        .login-card h1 img {
            height: 32px;
            vertical-align: middle;
        }
        
        .form-group { 
            margin-bottom: 20px; 
            text-align: left; 
        }
        
        .form-group label { 
            display: block; 
            font-size: 0.85rem; 
            font-weight: 600; 
            color: #94a3b8; 
            margin-bottom: 6px;
        }
        
        .form-group input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #334155; 
            border-radius: 8px; 
            font-size: 1rem; 
            background: #0f172a; 
            color: #e2e8f0; 
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .login-buttons { 
            display: flex; 
            gap: 10px; 
            margin-top: 24px; 
        }
        
        .btn {
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            flex: 1; 
            cursor: pointer; 
            font-weight: 600;
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        .btn-primary {
            background: #3b82f6;
            color: #ffffff;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-secondary { 
            background: #334155; 
            color: #e2e8f0; 
        }
        
        .btn-secondary:hover { 
            background: #475569; 
        }
        
        .error-msg { 
            color: #ef4444; 
            font-size: 0.9rem; 
            margin-top: 14px; 
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>
            <img src="logo.png" alt="ShopBox Logo" onerror="this.style.display='none'"> 
            ShopBox Login
        </h1>
        
        <form id="loginForm" onsubmit="handleLoginSubmit(event)">
            <div class="form-group">
                <label for="pin">Enter Access PIN</label>
                <input type="password" id="pin" placeholder="••••" maxlength="4" required autocomplete="off">
            </div>
            
            <div class="login-buttons">
                <!-- Log in as Clerk/Employee -->
                <button type="button" class="btn btn-secondary" onclick="attemptLogin('clerk')">Clerk Log In</button>
                <!-- Log in as Owner -->
                <button type="submit" class="btn btn-primary">Owner Log In</button>
            </div>
        </form>

        <div id="errorArea" class="error-msg"></div>
    </div>

    <script>
        // Simple login system simulation using hardcoded pins for demo purposes
        function attemptLogin(role) {
            const pinInput = document.getElementById("pin").value;
            const errorArea = document.getElementById("errorArea");
            errorArea.innerText = ""; // Clear any previous errors

            if (!pinInput) {
                errorArea.innerText = "Please enter your PIN code first.";
                return;
            }

            // Quick hackathon credentials verification
            if (role === 'owner' && (pinInput === '1234' || pinInput === '0000')) {
                const session = { username: "Owner", role: "owner" };
                localStorage.setItem("shopbox_session", JSON.stringify(session));
                window.location.href = "index.html";
            } else if (role === 'clerk' && pinInput === '5555') {
                const session = { username: "Clerk Staff", role: "clerk" };
                localStorage.setItem("shopbox_session", JSON.stringify(session));
                window.location.href = "index.html";
            } else {
                errorArea.innerText = "Incorrect PIN code. Try 1234 (Owner) or 5555 (Clerk).";
            }
        }

        function handleLoginSubmit(event) {
            event.preventDefault();
            attemptLogin('owner');
        }
    </script>
</body>
</html>
